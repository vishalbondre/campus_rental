# ── Server ───────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── DataSource ───────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/campus_rental?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:6126}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-please}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# ── Email (Campus Email Verification) ────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.email.verification.base-url=http://localhost:3000/verify
app.email.from=noreply@campusrent.app

# ── Allowed Campus Email Domains ─────────────────────────────
# app.campus.email-domains=.edu,.ac.in,.ac.uk,.com

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=D:/Mark_VII/IMCC/Sem 2/Mini Project/Campus Resourse Rental/backend/uploads

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ──────────────────────────────────────────────────
logging.level.com.campusrental=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(%-40.40logger{39}){cyan} : %msg%n
